<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="style.css">
  <title>Frontend Mentor | Product preview card component</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  <style>
    .attribution { font-size: 11px; text-align: center; }
    .attribution a { color: hsl(228, 45%, 44%); }
  </style>
</head>
<body>
<main>
  <div class="product-container">
  <div class="product">
    <picture class="picture">
    <source srcset="images/image-product-desktop.jpg" media="(min-width: 600px)">
    <img src="images/image-product-mobile.jpg" alt="perfume display">
    </picture>
    <div class="product__content">
    <p class="category">Perfume</p> 

    <h1 class="Title">Gabrielle Essence Eau De Parfum</h1> 

    <p class="content">A floral, solar and voluptuous interpretation composed by Olivier Polge, 
    Perfumer-Creator for the House of CHANEL.</p> 
    <div class="prices">
    <p class="discount">$149.99</p>
    <p class="real">$169.99</p>
    </div>
    <button class="button"
    data-icon="shopping cart"> Add to Cart</button> 
</div>
  </main>
 </div>
  </div>
  <div class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge" target="_blank">Frontend Mentor</a>. 
    Coded by <a href="#">CHRIS</a>.
  </div>
</body>
</html>
